<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>港区ちぃばす 停留所一覧</title>
    <!-- Google tag (gtag.js) -->
    <script src="config.js"></script>
    <script>
        if (typeof GTAG_ID !== 'undefined' && GTAG_ID) {
            var gtagScript = document.createElement('script');
            gtagScript.async = true;
            gtagScript.src = 'https://www.googletagmanager.com/gtag/js?id=' + GTAG_ID;
            document.head.appendChild(gtagScript);

            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            gtag('js', new Date());
            gtag('config', GTAG_ID);
        }
    </script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-header">港区ちぃばす 停留所一覧</div>
            <div class="route-wrap">
                <label for="route-select">ルート</label>
                <select id="route-select" aria-label="ルート選択">
                    <option value="">全停留所</option>
                </select>
            </div>
            <div class="route-wrap direction-wrap">
                <label for="direction-select">方向</label>
                <select id="direction-select" aria-label="方向選択" disabled>
                    <option value="">-- ルートを選択 --</option>
                </select>
            </div>
            <div class="search-wrap">
                <input type="text" id="search" placeholder="停留所名で検索…" aria-label="検索">
            </div>
            <div id="stop-list" class="stop-list">
                <div class="loading">読み込み中…</div>
            </div>
        </aside>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="script.js"></script>
</body>
</html>
